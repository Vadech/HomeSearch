services:
  - type: web
    name: homesearch
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: homesearch-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
